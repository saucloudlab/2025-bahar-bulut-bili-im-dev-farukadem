version: '3.8'

services:
  db:
    build: ./db           
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: deneme60605252
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    build: ./minio      
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: deneme60605252
    ports:
      - "9000:9000"
      - "9001:9001"
  
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
      - minio

volumes:
  postgres_data:
  minio_data:
